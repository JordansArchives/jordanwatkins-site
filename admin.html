<!-- Favicon -->

</head>
<body>

<!-- Animated paper texture background -->
<canvas id="paperTexture" class="paper-texture"></canvas>

<!-- Floating depth icons -->
<div class="floating-icons-layer" id="floatingIcons"></div>

<!-- ======== PASSWORD GATE ======== -->
<div class="admin-gate" id="adminGate">
  <div class="post-window admin-gate-window">
    <div class="xp-titlebar">
      <span class="xp-titlebar-text">admin login</span>
      <div class="xp-titlebar-buttons">
        <span class="xp-btn">_</span>
        <span class="xp-btn">&#x25A1;</span>
        <span class="xp-btn">&times;</span>
      </div>
    </div>
    <div class="xp-body admin-gate-body">
      <p class="admin-gate-label">email</p>
      <input type="email" id="adminEmail" class="admin-input" placeholder="your email" autocomplete="email">
      <p class="admin-gate-label">password</p>
      <input type="password" id="adminPassword" class="admin-input" placeholder="enter password" autocomplete="current-password">
      <button class="admin-btn admin-btn-primary" id="adminLoginBtn">enter</button>
      <button class="admin-btn admin-btn-secondary admin-reset-btn" id="adminResetBtn">reset password</button>
      <p class="admin-gate-error" id="adminGateError"></p>
    </div>
  </div>
</div>

<!-- ======== ADMIN PANEL (hidden until authenticated) ======== -->
<main class="blog-page admin-panel" id="adminPanel" style="display:none;">

  <!-- Back -->
  <a href="blog.html" class="about-back" aria-label="Back to writings">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12"></line>
      <polyline points="12 19 5 12 12 5"></polyline>
    </svg>
    <span>writings</span>
  </a>

  <!-- ---- Post List View ---- -->
  <div id="adminListView">
    <div class="admin-header">
      <h1 class="blog-title">admin</h1>
      <div class="admin-header-actions">
        <button class="admin-btn admin-btn-primary" id="newPostBtn">+ new post</button>
        <button class="admin-btn admin-btn-secondary" id="adminSignOutBtn">sign out</button>
      </div>
    </div>

    <div class="admin-posts-list" id="adminPostsList">
      <div class="blog-loading">Loading posts</div>
    </div>
  </div>

  <!-- ---- Post Editor View ---- -->
  <div id="adminEditorView" style="display:none;">
    <div class="post-window admin-editor-window">
      <div class="xp-titlebar">
        <span class="xp-titlebar-text" id="editorTitle">new post</span>
        <div class="xp-titlebar-buttons">
          <span class="xp-btn">_</span>
          <span class="xp-btn">&#x25A1;</span>
          <span class="xp-btn">&times;</span>
        </div>
      </div>
      <div class="xp-body admin-editor-body">

        <div class="admin-field">
          <label class="admin-label" for="postTitle">title</label>
          <input type="text" id="postTitle" class="admin-input" placeholder="Post title">
        </div>

        <div class="admin-field-row">
          <div class="admin-field admin-field-half">
            <label class="admin-label" for="postTopic">topic</label>
            <input type="text" id="postTopic" class="admin-input" placeholder="e.g. Design, Life, Tech">
          </div>
          <div class="admin-field admin-field-half">
            <label class="admin-label" for="postDate">date</label>
            <input type="date" id="postDate" class="admin-input">
          </div>
        </div>

        <div class="admin-field">
          <label class="admin-label" for="postExcerpt">excerpt</label>
          <input type="text" id="postExcerpt" class="admin-input" placeholder="Short preview for the card">
        </div>

        <div class="admin-field">
          <label class="admin-label" for="postCover">cover image</label>
          <div class="admin-image-upload" id="coverUploadZone">
            <div class="admin-image-preview" id="coverPreview" style="display:none;">
              <img id="coverPreviewImg" alt="Cover preview">
              <button class="admin-image-remove" id="coverRemoveBtn" title="Remove image">&times;</button>
            </div>
            <div class="admin-image-dropzone" id="coverDropzone">
              <input type="file" id="coverFileInput" accept="image/*" hidden>
              <p class="admin-dropzone-text">drop image here or <span class="admin-dropzone-link">browse</span></p>
              <p class="admin-dropzone-hint">JPG, PNG, GIF, WebP — max 5MB</p>
            </div>
            <div class="admin-image-uploading" id="coverUploading" style="display:none;">
              <div class="blog-loading">Uploading</div>
            </div>
          </div>
        </div>

        <div class="admin-field">
          <label class="admin-label">content</label>
          <div class="admin-toolbar">
            <button class="admin-toolbar-btn" data-action="bold" title="Bold"><b>B</b></button>
            <button class="admin-toolbar-btn" data-action="italic" title="Italic"><i>I</i></button>
            <button class="admin-toolbar-btn" data-action="heading" title="Heading">H2</button>
            <button class="admin-toolbar-btn" data-action="quote" title="Quote">"</button>
            <button class="admin-toolbar-btn" data-action="link" title="Link">&#128279;</button>
            <span class="admin-toolbar-sep"></span>
            <button class="admin-toolbar-btn" data-action="image" title="Insert image">&#128247;</button>
          </div>
          <textarea id="postContent" class="admin-textarea" placeholder="Write your post here... Use HTML tags or the toolbar above."></textarea>
        </div>

        <!-- Inline image inserter (hidden by default) -->
        <div class="admin-inline-image" id="inlineImagePanel" style="display:none;">
          <div class="admin-field">
            <label class="admin-label">insert image into post</label>
            <div class="admin-image-upload" id="inlineUploadZone">
              <div class="admin-image-dropzone" id="inlineDropzone">
                <input type="file" id="inlineFileInput" accept="image/*" hidden>
                <p class="admin-dropzone-text">drop image or <span class="admin-dropzone-link">browse</span></p>
              </div>
              <div class="admin-image-uploading" id="inlineUploading" style="display:none;">
                <div class="blog-loading">Uploading</div>
              </div>
            </div>
          </div>
        </div>

        <div class="admin-field">
          <label class="admin-label">
            <input type="checkbox" id="postPublished" checked> published
          </label>
        </div>

        <div class="admin-actions">
          <button class="admin-btn admin-btn-secondary" id="editorCancelBtn">cancel</button>
          <button class="admin-btn admin-btn-danger" id="editorDeleteBtn" style="display:none;">delete</button>
          <button class="admin-btn admin-btn-primary" id="editorSaveBtn">save post</button>
        </div>

        <p class="admin-status" id="editorStatus"></p>

      </div>
    </div>
  </div>

</main>

<!-- ======== PASSWORD RESET VIEW (shown when recovery link is clicked) ======== -->
<div class="admin-gate" id="adminResetView" style="display:none;">
  <div class="post-window admin-gate-window">
    <div class="xp-titlebar">
      <span class="xp-titlebar-text">set new password</span>
      <div class="xp-titlebar-buttons">
        <span class="xp-btn">_</span>
        <span class="xp-btn">&#x25A1;</span>
        <span class="xp-btn">&times;</span>
      </div>
    </div>
    <div class="xp-body admin-gate-body">
      <p class="admin-gate-label">new password</p>
      <input type="password" id="resetNewPassword" class="admin-input" placeholder="at least 8 characters" autocomplete="new-password">
      <p class="admin-gate-label">confirm password</p>
      <input type="password" id="resetConfirmPassword" class="admin-input" placeholder="re-enter password" autocomplete="new-password">
      <button class="admin-btn admin-btn-primary" id="resetSaveBtn">set password</button>
      <p class="admin-status" id="resetStatus"></p>
    </div>
  </div>
</div>

<footer class="about-footer">
  <a href="index.html">jordan's archives</a>
</footer>

<!-- Paper texture animation script -->
<script src="paper-texture.js"></script>
<!-- Floating depth icons -->
<script src="floating-icons.js"></script>
<!-- Admin logic -->
<script src="admin.js"></script>
</body>
</html>
